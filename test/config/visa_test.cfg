[server]
debug_mode = 0
http_port = 8888
http_addr = 127.0.0.1
adapters = system_info, visa
enable_cors = true
access_logging = error

[tornado]
logging = debug
color = true

[adapter.visa]
module = odin_visa.adapter.VisaAdapter
devices_config = test/config/devices.json


[adapter.system_info]
module = odin_control.adapters.system_info.SystemInfoAdapter
